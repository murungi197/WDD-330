<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Checkout</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header class="divider" id="main-header"></header>

    <main class="divider">
      <section class="products">
        <h2>Review & Place your Order</h2>

        <form id="checkout-form" class="checkout" novalidate>
          <div class="checkout__form">
            <div class="checkout__section">
              <h3>Customer Name</h3>
              <div class="checkout__row">
                <div class="checkout__field">
                  <label for="fname">First Name</label>
                  <input type="text" id="fname" name="fname" required />
                </div>
                <div class="checkout__field">
                  <label for="lname">Last Name</label>
                  <input type="text" id="lname" name="lname" required />
                </div>
              </div>
            </div>

            <div class="checkout__section">
              <h3>Address</h3>
              <div class="checkout__row">
                <div class="checkout__field" style="grid-column: 1 / -1;">
                  <label for="street">Street Address</label>
                  <input type="text" id="street" name="street" required />
                </div>
              </div>
              <div class="checkout__row">
                <div class="checkout__field">
                  <label for="city">City</label>
                  <input type="text" id="city" name="city" required />
                </div>
                <div class="checkout__field">
                  <label for="state">State</label>
                  <input type="text" id="state" name="state" required />
                </div>
                <div class="checkout__field">
                  <label for="zip">Zip Code</label>
                  <input type="text" id="zip" name="zip" required />
                </div>
              </div>
            </div>

            <div class="checkout__section">
              <h3>Payment</h3>
              <div class="checkout__row">
                <div class="checkout__field" style="grid-column: 1 / -1;">
                  <label for="cardNumber">Credit Card Number</label>
                  <input type="text" id="cardNumber" name="cardNumber" inputmode="numeric" required />
                </div>
              </div>
              <div class="checkout__row">
                <div class="checkout__field">
                  <label for="expiration">Expiration Date</label>
                  <input type="text" id="expiration" name="expiration" placeholder="MM/YY" required />
                </div>
                <div class="checkout__field">
                  <label for="code">Security Code</label>
                  <input type="text" id="code" name="code" inputmode="numeric" required />
                </div>
              </div>
            </div>
          </div>

          <aside class="checkout__summary">
            <div class="checkout__section">
              <h3>Order Summary</h3>
              <ul class="checkout__items" id="checkout-items"></ul>
              <table class="checkout__summary-table">
                <tr>
                  <td>Subtotal</td>
                  <td id="checkout-subtotal">$0.00</td>
                </tr>
                <tr>
                  <td>Tax (6%)</td>
                  <td id="checkout-tax">$0.00</td>
                </tr>
                <tr>
                  <td>Shipping</td>
                  <td id="checkout-shipping">$0.00</td>
                </tr>
                <tr class="checkout__summary-total">
                  <td>Order Total</td>
                  <td id="checkout-total">$0.00</td>
                </tr>
              </table>
              <button type="submit" class="checkout__submit" id="checkout-submit">Place Order</button>
            </div>
          </aside>
        </form>
      </section>
    </main>

    <footer id="main-footer"></footer>
    <script src="../js/checkout.js" type="module"></script>
  </body>
</html>
